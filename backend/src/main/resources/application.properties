spring.application.name=Envoy-backend

# 1. Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/Envoy
spring.datasource.username=postgres
spring.datasource.password=Ishika@2006

# 2. Hibernate / JPA Settings
# 'validate' ensures your Java code perfectly matches the SQL tables you already created
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Debugging
# This prints the actual SQL queries to your terminal so you can see what Spring is doing
spring.jpa.show-sql=true

# 4. Server Port
# Runs your backend on port 8080 so it doesn't conflict with Next.js (which uses 3000)
server.port=8080

# Dev credentials are defined in SecurityConfig.java via UserDetailsService bean
# Username: user | Password: password123

# 5. JWT Security Settings
# This is the "Key" used to sign your tokens. Keep it long and random!
envoy.jwt.secret=YourSuperSecretKeyThatIsVeryLongAndComplex1234567890ishika
envoy.jwt.expiration=3600000

# AES Key must be exactly 16, 24, or 32 characters long
envoy.encryption.key=1234567890123456